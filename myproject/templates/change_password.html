{# templates/change_password.html #}
{% extends 'base.html' %}
{% block title %}{{ t('change_password') }}{% endblock %}

{% block content %}
<div class="container py-4" style="max-width:500px">
  <h2 class="mb-4">🔑 {{ t('change_password') }}</h2>
  <div class="card shadow-sm">
    <div class="card-body">
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
          <label for="current_password" class="form-label">{{ t('current_password') }}</label>
          <input type="password" id="current_password" name="current_password"
                 class="form-control" required autocomplete="current-password">
        </div>
        <div class="mb-3">
          <label for="new_password" class="form-label">{{ t('new_password') }}</label>
          <input type="password" id="new_password" name="new_password"
                 class="form-control" required autocomplete="new-password">
          <div class="form-text">{{ t('password_requirements') }}</div>
        </div>
        <div class="mb-3">
          <label for="confirm_password" class="form-label">{{ t('confirm_password') }}</label>
          <input type="password" id="confirm_password" name="confirm_password"
                 class="form-control" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary w-100">{{ t('change_password') }}</button>
      </form>
    </div>
  </div>
  <div class="mt-3">
    <a href="/" class="btn btn-outline-secondary">← {{ t('upload') }}</a>
  </div>
</div>
{% endblock %}
