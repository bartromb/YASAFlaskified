{# templates/errors/404.html #}
{% extends "base.html" %}
{% block title %}{{ t("error_404_short") }}{% endblock %}
{% block content %}
<div class="container py-5 text-center" style="max-width:500px">
  <div class="fs-1 mb-3">🔍</div>
  <h2>{{ t("error_404_title") }}</h2>
  <p class="text-muted">{{ error.description if error else t("error_404_body") }}</p>
  <a href="/" class="btn btn-primary mt-3">← {{ t("back_home") }}</a>
</div>
{% endblock %}
