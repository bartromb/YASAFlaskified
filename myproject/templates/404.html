{# templates/errors/404.html #}
{% extends "base.html" %}
{% block title %}Niet gevonden{% endblock %}
{% block content %}
<div class="container py-5 text-center" style="max-width:500px">
  <div class="fs-1 mb-3">🔍</div>
  <h2>Pagina niet gevonden</h2>
  <p class="text-muted">{{ error.description if error else "De gevraagde pagina bestaat niet." }}</p>
  <a href="/" class="btn btn-primary mt-3">← Terug naar home</a>
</div>
{% endblock %}
