name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-cov flake8
          pip install numpy scipy mne lightgbm yasa

      - name: Lint (psgscoring)
        run: |
          flake8 myproject/psgscoring/ \
            --max-line-length=100 \
            --ignore=E501,W503 \
            --exclude=__pycache__

      - name: Run unit tests
        run: |
          cd myproject
          python -m pytest psgscoring/tests/ -v --tb=short \
            --cov=psgscoring --cov-report=term-missing

  syntax-check:
    name: Syntax check all modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check syntax
        run: |
          python -m py_compile myproject/psgscoring/*.py
          python -m py_compile myproject/arousal_analysis.py
          python -m py_compile myproject/generate_pdf_report.py
          python -m py_compile myproject/generate_psg_report.py
          echo "All syntax checks passed"
